services:
  postgres:
    image: postgres:16-alpine
    container_name: statesight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: statesight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - statesight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d statesight"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: statesight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    container_name: statesight-api
    restart: unless-stopped
    environment:
      API_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/statesight?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GITHUB_WEBHOOK_SECRET: dev-secret
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.worker
    container_name: statesight-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/statesight?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.web
    container_name: statesight-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  statesight-postgres-data:
